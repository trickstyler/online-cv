career-profile:
    title: Objective
    summary: |
      MLOps Team Lead with over a decade of hands-on experience in
      architecting, developing and turning ML research into production
      systems that run at scale. I lead teams the way I write code - with
      clarity, ownership, and a bias for shipping. I've built and shipped
      across industries where scale is the starting point. Seeking a
      challenging role to leverage technical proficiency and leadership
      abilities to create a meaningful difference.

