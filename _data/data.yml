experiences:
    - role: MLOps Team Lead
      time: 2024 - Present
      company: Wiliot
      details: |
        - Leading a team of 8 engineers (including 1 Data Scientist), owning the end-to-end lifecycle of production ML
          systems for large-scale IoT tracking across global supply chains.
        - Architected and scaled real-time streaming ML pipelines (Apache Flink, Kafka, Kubernetes) from hundreds to
          100K+ events/sec, enabling deployment across 4,000+ physical stores within one year.
        - Designed and operated end-to-end ML pipelines (training + inference), processing ~3TB/day and supporting
          ~20 production models.
        - Built complex real-time inference pipelines including data ingestion, decryption, enrichment, and fan-out
          model serving architectures.
        - Reduced system latency by up to 43% and infrastructure costs by ~15% through autoscaling and pipeline
          optimization.
        - Established production-grade monitoring for data drift, model performance, and system health, maintaining
          99.99% uptime SLA.
        - Improved team productivity and development velocity by promoting modern tooling and AI-assisted development
          workflows.
        - Partnered closely with Data Science, DevOps, PM and external stakeholders to deliver scalable ML solutions
          in production.

    - role: Staff Software Engineer for the BLADE system
      time: 2022 - 2024
      company: Intuit
      details: |
        - Responsible for the architecture, design, development, and maintenance of several core key components of
          the BLADE system.
        - Led a team of 4 engineers (including 1 Data Analyst).
        - Mentored junior developers, providing guidance and fostering their professional growth.
        - Collaborated closely with the data science team to bring machine learning models into production, aimed at
          protecting Intuit's APIs against malicious intentions from both security and fraud perspectives.
        - Successfully deployed several ML models, which at their peak handled ~1 million TPS while demonstrating
          impressive performance results (F1, p99 latency & throughput).
        - Utilized expertise in Apache Flink to develop a high-performance, scalable, and secure software solution.
        - Full project planning and management: cost, timeline and risks.

    - role: Senior Software Engineer for the RCS system
      time: 2020 - 2022
      company: Intuit
      details: |
        - Played a key role in the redesign, architecture, development, and maintenance of the Risk Control System
          (RCS) 2.0.
        - Spearheaded the migration from a legacy batch processing infrastructure, which was prone to crashes and
          lacked code quality, to a modern, highly available, and maintainable system based on a Java Spring boot
          microservices architecture. Post migration, the RCS system served its clients at 99.999% uptime with a
          NPS score of 86.
        - Collaborated with cross-functional teams to gather requirements, design system architecture, and implement
          robust solutions.

    - role: Senior Software Engineer for the Cloud Policy Connector system
      time: 2018 - 2020
      company: Cisco, Netanya
      details: |
        Design, Development and Integration of a cloud-based Java Spring system that aims to extend the capabilities
        of the ISE (Identity Services Engine) system into the cloud domain.
        Key responsibilities included:
          - Migrated existing product runtime to the AWS ECS Fargate platform.
          - Integrated peripheral services with their AWS counterparts (Cognito, RDS, etc.).
          - Developed and maintained three layers of testing (UT, FT, ST) and ensured quality.
          - Integration with offsite international dev/PO/PM teams for co-development of features, tests, pipeline
            and bugs handling.
          - Development of the back-office User management and Analytics system.
          - Responsible for ramping up of new engineers into the scrum.

    - role: Senior Software Developer and Tech Lead for the NetBeat™ system
      time: 2016 - 2018
      company: Netafim, Petah Tikva (in collaboration with mPrest systems)
      details: |
        Design, Development and Integration, from scratch, of a cloud-based Java Spring system that aims to give
        global farmers command and control of their fields and crops.
        Key responsibilities included:
          - Developed peripheral tools for the main app such as a watchdog and a math crop model.
          - Tested, initiated, and taught new technologies to the team including FOTA, DB Sync & migrations, and AOP.
          - Created a CI/CD infrastructure using Microsoft Fabric.
          - Improved performance and stability of the system deployed on Apache Tomcat servers.
          - Reviewed code, feature quality, and status as a liaison from Netafim.

    - role: Senior Software Engineer for the 'iD Platform' and 'CancerConnect' applications
      time: 2016 - 2016
      company: NantMobile (Out of business)
      details: |
        Development, maintenance and debugging for the backend of a TV, picture and voice recognition API.
          - Developing REST web services with RestEasy and Undertow.
          - Creating unit and integration tests (BDD) using Cucumber.
          - Continuous development and integration using Jenkins.
          - Developing atop Amazon Web Service's core functionalities such as EC2, S3 and DynamoDB.

    - role: Senior Project Manager of the 'Regional Meteorology' system
      time: 2015 - 2016
      company: IDF

    - role: Project Manager and Developer of the 'Sky Solver' system
      time: 2013 - 2015
      company: IDF

    - role: Team Leader and Developer of the 'TORC2H' system
      time: 2012 - 2013
      company: IDF

